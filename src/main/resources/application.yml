spring:
  application:
    name: petstoreorderservice
  cloud:
    azure:
      cosmos:
        endpoint: ${AZURE_COSMOS_URI}          # e.g. https://petstore-cosmos.documents.azure.com:443/
        key: ${AZURE_COSMOS_KEY}               # Primary key from Azure Portal
        database: ${AZURE_COSMOS_DATABASE:petstore-orders}
        populate-query-metrics: false
server:
  port: ${PETSTOREORDERSERVICE_SERVER_PORT:8080}

petstore:
  service:
    product:
      url: ${PETSTOREPRODUCTSERVICE_URL:http://localhost:8082}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    ssl:
      enabled: false
    diskspace:
      enabled: false

logging:
  level:
    root: INFO
    com.chtrembl: DEBUG
